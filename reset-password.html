<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | CapamulCars</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

    /* Fix browser autofill background color */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
      transition: background-color 5000s ease-in-out 0s;
      -webkit-text-fill-color: #ffffff !important;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            primary: '#9f1c1c',
            background: '#fbfaf8',
            foreground: '#272d37',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
  <div class="absolute inset-0 bg-black/60"></div>
  
  <div class="bg-white border p-8 rounded-2xl w-full max-w-md relative z-10 animate-fade-in shadow-xl">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-block font-serif text-2xl font-black tracking-tight text-gray-900 mb-1">CAPAMUL <span class="text-primary font-bold">CARS 2.0</span></a>
      <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Reset Password</p>
    </div>
    
    <div id="forms-container">
      <!-- Step 1: Request Code -->
      <form class="space-y-4" id="step1-form">
        <p class="text-sm text-gray-500 mb-4 text-center">Click the button below to receive a password reset code at your admin email address.</p>
        
        <button type="submit" id="send-code-btn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 text-sm uppercase">Send Reset Code</button>
      </form>

      <!-- Step 2: Verify Code -->
      <form class="space-y-4 hidden" id="step2-form">
        <p class="text-sm text-gray-500 mb-4 text-center">Enter the 6-digit code sent to your email.</p>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Reset Code</label>
          <input type="text" id="reset-otp" required maxlength="6" class="w-full border rounded-lg px-4 py-3 text-center tracking-[0.5em] font-bold text-lg focus:border-primary focus:outline-none bg-white text-gray-800" placeholder="000000" />
        </div>
        <button type="submit" class="w-full bg-primary hover:opacity-90 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 text-sm uppercase">Verify Code</button>
        <div class="text-center mt-3">
          <button type="button" id="resend-reset-otp-btn" class="text-xs text-gray-400 hover:text-gray-600 transition-colors font-semibold">Didn't receive it? Resend Code</button>
        </div>
      </form>

      <!-- Step 3: New Password -->
      <form class="space-y-4 hidden" id="step3-form">
        <p class="text-sm text-gray-500 mb-4 text-center">Create a new password for the admin panel.</p>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">New Password</label>
          <input type="password" id="new-password" required minlength="6" class="w-full border rounded-lg px-4 py-2 text-sm focus:border-primary focus:outline-none bg-white text-gray-800" placeholder="••••••••" />
        </div>
        <button type="submit" class="w-full bg-primary hover:opacity-90 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 text-sm uppercase">Save New Password</button>
      </form>
    </div>
    
    <div class="mt-6 text-center text-xs">
      <a href="auth.html" class="text-gray-400 hover:text-gray-600 transition-colors flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Login
      </a>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  
  <!-- EmailJS Integration -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      // NOTE: Replace 'YOUR_PUBLIC_KEY' with your actual EmailJS Public Key
      emailjs.init("8bYgrl4zv7OqxBU8a");
    })();
  </script>

  <script>
    const ADMIN_EMAIL = 'capamulcar2@gmail.com,vclumapac@nemsu.edu.ph';
    let generatedOTP = null;

    const step1 = document.getElementById('step1-form');
    const step2 = document.getElementById('step2-form');
    const step3 = document.getElementById('step3-form');
    const sendBtn = document.getElementById('send-code-btn');
    const resendBtn = document.getElementById('resend-reset-otp-btn');

    async function sendResetEmail(otp) {
      // NOTE: Replace these with your actual EmailJS Service ID and Template ID
      const serviceID = "service_dgu0d2n";
      const templateID = "template_qa2655a";

      const templateParams = {
        to_email: ADMIN_EMAIL,
        otp_code: otp,
        message: 'A request was made to verify your Capamul Cars admin access. Use this code to proceed.'
      };

      try {
        if (serviceID === "YOUR_SERVICE_ID") {
          console.warn("EmailJS not configured. Displaying OTP in console for testing.");
          console.log(`[MOCK EMAIL] To: ${ADMIN_EMAIL} | Reset Code: ${otp}`);
          alert(`[MOCK MODE] EmailJS keys missing.\n\nFor testing purposes, your reset code is: ${otp}`);
          return true;
        }
        await emailjs.send(serviceID, templateID, templateParams);
        return true;
      } catch (err) {
        console.error("Failed to send email:", err);
        alert("Failed to send reset email. Please check your EmailJS configuration.");
        return false;
      }
    }

    // Step 1: Request Code
    step1.addEventListener('submit', async (e) => {
      e.preventDefault();

      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      sendBtn.innerText = 'Sending...';
      sendBtn.disabled = true;

      const sent = await sendResetEmail(generatedOTP);
      if (sent) {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
      } else {
        sendBtn.innerText = 'Send Reset Code';
        sendBtn.disabled = false;
      }
    });

    // Resend Code
    resendBtn.addEventListener('click', async () => {
      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      const origText = resendBtn.innerText;
      resendBtn.innerText = 'Sending...';
      resendBtn.disabled = true;

      const sent = await sendResetEmail(generatedOTP);
      if (sent) {
        resendBtn.innerText = 'Code Sent!';
        setTimeout(() => {
          resendBtn.innerText = origText;
          resendBtn.disabled = false;
        }, 3000);
      } else {
        resendBtn.innerText = origText;
        resendBtn.disabled = false;
      }
    });

    // Step 2: Verify Code
    step2.addEventListener('submit', (e) => {
      e.preventDefault();
      const enteredOTP = document.getElementById('reset-otp').value.trim();

      if (enteredOTP === generatedOTP) {
        step2.classList.add('hidden');
        step3.classList.remove('hidden');
      } else {
        alert('Invalid or incorrect verification code. Please try again.');
      }
    });

    // Step 3: Save New Password
    step3.addEventListener('submit', (e) => {
      e.preventDefault();
      const newPass = document.getElementById('new-password').value;

      // Store new password in localStorage
      localStorage.setItem('admin_password', newPass);
      alert('Password has been successfully reset! You can now log in.');
      window.location.href = 'auth.html';
    });
  </script>
</body>
</html>
