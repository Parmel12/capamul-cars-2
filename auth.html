<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | CapamulCars</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            primary: '#9f1c1c',
            background: '#fbfaf8',
            foreground: '#272d37',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Fix browser autofill background color for dark mode */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
      transition: background-color 5000s ease-in-out 0s;
      -webkit-text-fill-color: #ffffff !important;
    }
  </style>
</head>
<body class="bg-gray-900 text-white antialiased min-h-screen flex items-center justify-center relative overflow-hidden p-4">
  <div class="absolute inset-0 bg-[url('images/hero-bg.jpg')] bg-cover bg-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"></div>
  </div>
  
  <div class="bg-black/40 backdrop-blur-md border border-white/10 p-8 rounded-3xl w-full max-w-md relative z-10 animate-fade-in shadow-2xl">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-block font-serif text-2xl font-black tracking-tight text-white mb-1">CAPAMUL <span class="text-primary font-bold">CARS 2.0</span></a>
      <p class="text-white/60 text-xs font-semibold uppercase tracking-wider" id="form-subtitle">Admin Login</p>
    </div>
    
    <div id="forms-container">
      <!-- Step 1: Login Credentials -->
      <form class="space-y-4" id="login-form">
        <div>
          <label class="block text-xs font-bold uppercase text-white/80 mb-1">Username / Email</label>
          <div class="relative">
            <input type="text" id="login-user" required class="w-full border rounded-lg px-4 py-3 text-sm focus:border-white focus:ring-1 focus:ring-white focus:outline-none bg-white/5 border-white/10 text-white placeholder-white/40 transition-colors pl-10" placeholder="admin" />
            <i data-lucide="user" class="h-4 w-4 text-white/50 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-white/80 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="login-pass" required class="w-full border rounded-lg pl-10 pr-10 py-3 text-sm focus:border-white focus:ring-1 focus:ring-white focus:outline-none bg-white/5 border-white/10 text-white placeholder-white/40 transition-colors" placeholder="••••••••" />
            <i data-lucide="lock" class="h-4 w-4 text-white/50 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-white/50 hover:text-white transition-colors" onclick="const p=document.getElementById('login-pass'); if(p.type==='password'){p.type='text'; document.getElementById('eye-icon').classList.add('hidden'); document.getElementById('eye-off-icon').classList.remove('hidden');}else{p.type='password'; document.getElementById('eye-icon').classList.remove('hidden'); document.getElementById('eye-off-icon').classList.add('hidden');}">
              <i data-lucide="eye" id="eye-icon" class="h-4 w-4"></i>
              <i data-lucide="eye-off" id="eye-off-icon" class="h-4 w-4 hidden"></i>
            </button>
          </div>
        </div>

        <p id="error-msg" class="text-xs text-red-400 font-bold hidden text-center">Invalid credentials. Please check your username and password.</p>

        <button type="submit" id="login-btn" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl transition-colors mt-4 text-sm uppercase tracking-wider shadow-lg shadow-primary/20">Sign In</button>
        
        <div class="text-center mt-4">
          <a href="reset-password.html" class="text-xs text-white/50 hover:text-white/80 transition-colors font-semibold">Forgot Password?</a>
        </div>
      </form>

      <!-- Step 2: Enter OTP -->
      <form class="space-y-4 hidden" id="otp-form">

        <div>
          <label class="block text-xs font-bold uppercase text-white/80 mb-1">Verification Code</label>
          <input type="text" id="login-otp" required maxlength="6" inputmode="numeric" pattern="[0-9]*"
            class="w-full border rounded-lg px-4 py-3 text-center tracking-[0.5em] font-bold text-lg focus:border-white focus:outline-none bg-white/5 border-white/10 text-white" placeholder="000000" />
        </div>
        
        <p id="otp-error" class="text-xs text-red-400 font-bold hidden text-center">Incorrect verification code. Please try again.</p>

        <button type="submit" id="verify-btn" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl transition-colors mt-2 text-sm uppercase tracking-wider shadow-lg shadow-primary/20">Verify &amp; Access</button>
        
        <div class="text-center mt-3">
          <button type="button" id="resend-otp-btn" class="text-xs text-white/50 hover:text-white/80 transition-colors font-semibold">Didn't receive it? Resend Code</button>
        </div>
      </form>
    </div>
    
    <div class="mt-8 text-center pt-5 border-t border-white/10">
      <a href="index.html" class="text-xs font-bold text-white/40 hover:text-white/70 transition-colors flex items-center justify-center gap-1.5">
        <i data-lucide="arrow-left" class="h-3.5 w-3.5"></i> Back to Website
      </a>
    </div>
  </div>

  <script>lucide.createIcons();</script>

  <!-- EmailJS Integration -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      emailjs.init("8bYgrl4zv7OqxBU8a");
    })();
  </script>

  <script>
    const ADMIN_EMAIL = 'capamulcar2@gmail.com,vclumapac@nemsu.edu.ph';
    let generatedOTP = null;

    // ─── Device Login Count ────────────────────────────────────────
    // Tracks how many times this browser has successfully logged in.
    // First 3 logins: OTP required. Login 4 and onward: password only.
    const OTP_REQUIRED_LOGINS = 3; // First 3 logins need OTP
    const loginCount = parseInt(localStorage.getItem('device_login_count') || '0');
    const requireOTP  = loginCount < OTP_REQUIRED_LOGINS;
    const logsRemaining = Math.max(0, OTP_REQUIRED_LOGINS - loginCount);

    const loginForm = document.getElementById('login-form');
    const otpForm   = document.getElementById('otp-form');
    const subtitle  = document.getElementById('form-subtitle');
    const loginBtn  = document.getElementById('login-btn');
    const verifyBtn = document.getElementById('verify-btn');
    const resendBtn = document.getElementById('resend-otp-btn');

    // ─── Send OTP Email ────────────────────────────────────────────
    async function sendLoginEmail(otp) {
      const serviceID  = "service_dgu0d2n";
      const templateID = "template_qa2655a";
      const templateParams = {
        to_email: ADMIN_EMAIL,
        otp_code: otp,
        message: `A login attempt was made on the Capamul Cars admin panel (Login #${loginCount + 1} of ${OTP_REQUIRED_LOGINS} requiring verification). Use this code to proceed.`
      };
      try {
        await emailjs.send(serviceID, templateID, templateParams);
        return true;
      } catch (err) {
        console.error("EmailJS Error:", err);
        alert(`Failed to send verification email. Error: ${err.text || err.message || 'Unknown error'}`);
        return false;
      }
    }

    // ─── Increment Login Count & Grant Access ──────────────────────
    function grantAccess() {
      const newCount = loginCount + 1;
      localStorage.setItem('device_login_count', newCount.toString());
      localStorage.setItem('admin_token', 'capamul_admin_session');

      // Generate a unique device_id for this browser if it doesn't have one yet.
      // This is used by admin.js to track this device and allow revocation.
      if (!localStorage.getItem('device_id')) {
        const uid = 'dev-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        localStorage.setItem('device_id', uid);
      }

      window.location.href = 'admin.html';
    }

    // ─── Step 1: Credentials Submit ────────────────────────────────
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;

      const isValid = (user === 'admin' && pass === 'admin') || pass === 'Admincapamulcar2.0';

      if (!isValid) {
        document.getElementById('error-msg').classList.remove('hidden');
        return;
      }

      document.getElementById('error-msg').classList.add('hidden');

      if (!requireOTP) {
        // ✅ Trusted device — skip OTP, grant access directly
        loginBtn.innerHTML = '<i data-lucide="loader-2" class="h-4 w-4 animate-spin inline-block mr-2"></i> Signing in...';
        loginBtn.disabled = true;
        lucide.createIcons();
        setTimeout(grantAccess, 600); // Small delay for UX
        return;
      }

      // 🔐 First 3 logins — send OTP
      loginBtn.innerHTML = '<i data-lucide="loader-2" class="h-4 w-4 animate-spin inline-block mr-2"></i> Sending Code...';
      loginBtn.disabled = true;
      lucide.createIcons();

      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      console.log("Generated OTP:", generatedOTP); // For local testing

      const sent = await sendLoginEmail(generatedOTP);

      loginBtn.innerHTML = 'Sign In';
      loginBtn.disabled = false;

      if (sent) {
        loginForm.classList.add('hidden');
        otpForm.classList.remove('hidden');
        document.getElementById('login-otp').focus();
      }
    });

    // ─── Step 2: OTP Submit ────────────────────────────────────────
    otpForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const entered = document.getElementById('login-otp').value.trim();

      if (entered === generatedOTP) {
        document.getElementById('otp-error').classList.add('hidden');
        verifyBtn.innerHTML = '<i data-lucide="loader-2" class="h-4 w-4 animate-spin inline-block mr-2"></i> Verified!';
        verifyBtn.disabled = true;
        lucide.createIcons();
        setTimeout(grantAccess, 500);
      } else {
        document.getElementById('otp-error').classList.remove('hidden');
        // Shake animation
        const inp = document.getElementById('login-otp');
        inp.classList.add('border-red-500');
        inp.value = '';
        setTimeout(() => inp.classList.remove('border-red-500'), 1500);
      }
    });

    // ─── Resend OTP ────────────────────────────────────────────────
    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      resendBtn.textContent = 'Resending...';
      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      await sendLoginEmail(generatedOTP);
      console.log("Resent OTP:", generatedOTP);
      resendBtn.textContent = '✓ Code Sent!';
      setTimeout(() => {
        resendBtn.disabled = false;
        resendBtn.textContent = "Didn't receive it? Resend Code";
      }, 3000);
    });

    // ─── Always clear session on auth page load ────────────────
    // This PREVENTS the auto-bypass where visiting auth.html while
    // still having a stale token would skip the login entirely.
    localStorage.removeItem('admin_token');
  </script>
</body>
</html>
